name: Common Java CI

on:
  workflow_call:
    inputs:
      java-version:
        type: string
        default: "21"
      build-tool:
        type: string
        default: "maven"
      image-name:
        type: string
        required: true
      push-image:
        type: boolean
        default: true

    secrets:
      REGISTRY_USERNAME:
        required: false
      REGISTRY_PASSWORD:
        required: false

permissions:
  contents: read

jobs:

  build-package:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ inputs.java-version }}
          cache: maven

      - name: Build Maven
        if: inputs.build-tool == 'maven'
        run: mvn -B clean package -DskipTests

      - name: Build Gradle
        if: inputs.build-tool == 'gradle'
        run: ./gradlew clean assemble -x test --no-daemon

      - uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: |
            target/**/*.jar
            build/libs/*.jar

  test:
    runs-on: ubuntu-latest
    needs: build-package

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ inputs.java-version }}
          cache: maven

      - name: Test Maven
        if: inputs.build-tool == 'maven'
        run: mvn -B test

      - name: Test Gradle
        if: inputs.build-tool == 'gradle'
        run: ./gradlew test --no-daemon

      - uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            target/surefire-reports/**
            build/test-results/**
            build/reports/**

  collect-review-context:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Collect Diff
        run: |
          git fetch origin ${{ github.base_ref }}
          git diff origin/${{ github.base_ref }} > diff.txt

      - name: Collect Project Structure
        run: |
          find src/main/java -type f > project-structure.txt || true
          find src/test -type f > test-structure.txt || true

      - name: Collect Build Context
        run: |
          find . -name pom.xml > build-context.txt
          find . -name Dockerfile >> build-context.txt

      - uses: actions/upload-artifact@v4
        with:
          name: ai-review-context
          path: |
            diff.txt
            project-structure.txt
            test-structure.txt
            build-context.txt

  ai-review:
    name: AI Review
    runs-on: ubuntu-latest

    needs:
      - collect-review-context
  
    if: github.event_name == 'pull_request'
  
    steps:
  
      - name: Checkout Application Repository
        uses: actions/checkout@v4
  
      - name: Download Review Context
        uses: actions/download-artifact@v4
        with:
          name: ai-review-context
  
      - name: Checkout Common CI Repository
        uses: actions/checkout@v4
        with:
          repository: Asikahamed/common-ci
          path: common-ci
  
      - name: Debug Workspace
        run: |
          echo "Current Directory:"
          pwd
  
          echo ""
          echo "Workspace Structure:"
          find . -maxdepth 3 -type d
  
      - name: Verify Agent Files
        run: |
          ls -R common-ci/agents
          ls -R common-ci/skills
  
      - name: Load Architecture Agent
        run: |
          echo "Loading Architecture Agent..."
          cat common-ci/agents/architecture-review-agent.md
          echo ""
          cat common-ci/skills/spring-boot-architecture-skill.md
  
      - name: Load Code Review Agent
        run: |
          echo "Loading Code Review Agent..."
          cat common-ci/agents/code-review-agent.md
          echo ""
          cat common-ci/skills/java-code-review-skill.md
  
      - name: Load Security Agent
        run: |
          echo "Loading Security Agent..."
          cat common-ci/agents/security-review-agent.md
          echo ""
          cat common-ci/skills/java-security-skill.md
  
      - name: Load Test Quality Agent
        run: |
          echo "Loading Test Quality Agent..."
          cat common-ci/agents/test-quality-agent.md
          echo ""
          cat common-ci/skills/java-testing-skill.md
  
      - name: Generate Architecture Report
        run: |
          cat > architecture-review.md <<EOF
          # Architecture Review
  
          Architecture agent loaded successfully.
  
          Waiting for Copilot integration.
          EOF
  
      - name: Generate Code Review Report
        run: |
          cat > code-review.md <<EOF
          # Code Review
  
          Code review agent loaded successfully.
  
          Waiting for Copilot integration.
          EOF
  
      - name: Generate Security Review Report
        run: |
          cat > security-review.md <<EOF
          # Security Review
  
          Security review agent loaded successfully.
  
          Waiting for Copilot integration.
          EOF
  
      - name: Generate Test Quality Report
        run: |
          cat > test-quality-review.md <<EOF
          # Test Quality Review
  
          Test quality agent loaded successfully.
  
          Waiting for Copilot integration.
          EOF
  
      - name: Upload AI Review Reports
        uses: actions/upload-artifact@v4
        with:
          name: ai-review-reports
          retention-days: 7
          path: |
            architecture-review.md
            code-review.md
            security-review.md
            test-quality-review.md
  
      - name: Publish Reviews
        run: |
          echo "# AI Review Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
  
          cat architecture-review.md >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
  
          cat code-review.md >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
  
          cat security-review.md >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
  
          cat test-quality-review.md >> $GITHUB_STEP_SUMMARY

  docker:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Build Output
        uses: actions/download-artifact@v4
        with:
          name: build-output

      - name: Login to Docker Hub
        if: |
          inputs.push-image == true &&
          (
            github.event_name == 'pull_request' ||
            github.ref == 'refs/heads/main'
          )
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build Docker Image
        run: |
          docker build \
            -t ${{ inputs.image-name }}:${{ github.sha }} \
            -t ${{ inputs.image-name }}:latest .

      - name: Build and Push Docker Image
        if: >
          github.event_name == 'pull_request' &&
          github.base_ref == 'main'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ inputs.image-name }}:pr-${{ github.event.number }}
            ${{ inputs.image-name }}:${{ github.sha }}

  publish-artifacts:
    runs-on: ubuntu-latest
    needs:
      - build-package
      - test

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: build-output

      - uses: actions/download-artifact@v4
        with:
          name: test-reports

      - uses: actions/upload-artifact@v4
        with:
          name: java-build-artifacts
          path: .
