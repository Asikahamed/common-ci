name: Common Java CI (reusable)

on:
  workflow_call:
    inputs:
      java-version:
        type: string
        required: true
      image-name:
        type: string
        required: true
      enable-security:
        type: boolean
        required: true
      enable-review:
        type: boolean
        required: true
      enable-test-generation:
        type: boolean
        required: true
      enable-docker:
        type: boolean
        required: true
      enable-autofix:
        type: boolean
        required: true
      build-tool:
        type: string
        required: false
        default: 'maven'
      maven-goals:
        type: string
        required: false
        default: 'verify'
    secrets:
      GITHUB_TOKEN:
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      build_path: target
    steps:
      - uses: actions/checkout@v4
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ inputs.java-version }}
      - name: Cache Maven repo
        if: ${{ inputs.build-tool == 'maven' }}
        uses: actions/cache@v3
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-m2-${{ inputs.java-version }}-${{ hashFiles('**/pom.xml') }}
      - name: Build (Maven)
        if: ${{ inputs.build-tool == 'maven' }}
        run: mvn -B -e -T 1C ${{ inputs.maven-goals }}
      - name: Build (Gradle)
        if: ${{ inputs.build-tool == 'gradle' }}
        run: ./gradlew build --no-daemon
      - name: Set build output path
        run: echo "build_path=target" >> $GITHUB_OUTPUT

  security:
    needs: build
    runs-on: ubuntu-latest
    if: ${{ inputs.enable-security == true }}
    steps:
      - uses: actions/checkout@v4
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ inputs.java-version }}
      - name: OWASP Dependency Check (Maven)
        if: ${{ inputs.build-tool == 'maven' }}
        run: mvn org.owasp:dependency-check-maven:check -Dformat=ALL || true
      - name: Optional auto-fix (dependency update)
        if: ${{ inputs.enable-autofix == true && inputs.build-tool == 'maven' }}
        run: |
          echo "Auto-fix enabled: run safe remediation steps (caller must review before merge)"
          # Placeholder: implement safe remediation commands if desired
      - name: Security summary
        run: echo "Security scan completed. Critical findings should be handled by the caller."

  test:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ inputs.java-version }}
      - name: Run tests (Maven)
        if: ${{ inputs.build-tool == 'maven' }}
        run: mvn -B test
      - name: Upload test results
        uses: actions/upload-artifact@v3
        with:
          name: test-results
          path: target/surefire-reports

  review:
    needs: test
    runs-on: ubuntu-latest
    if: ${{ inputs.enable-review == true }}
    steps:
      - name: Static analysis / code review
        run: |
          echo "Run static analysis, linters and prepare PR comments (agent integrations go here)"

  test-generation:
    needs: review
    runs-on: ubuntu-latest
    if: ${{ inputs.enable-test-generation == true }}
    steps:
      - name: Test suggestion analysis
        run: |
          echo "Analyze coverage and suggest missing tests (do not auto-commit tests)"

  docker:
    needs: test-generation
    runs-on: ubuntu-latest
    if: ${{ inputs.enable-docker == true }}
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t ${{ inputs.image-name }}:latest .
      - name: Docker checks
        run: |
          echo "Docker checks: base image, multi-stage, non-root user, size recommendations."

  package:
    needs: [docker]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Package artifacts
        run: |
          echo "Package step — place built artifacts into a standard location (target/ or build/)"
          # preserve artifacts for upload

  upload-artifacts:
    needs: package
    runs-on: ubuntu-latest
    steps:
      - name: Upload build artifacts
        uses: actions/upload-artifact@v3
        with:
          name: build-artifacts
          path: |
            target
            build